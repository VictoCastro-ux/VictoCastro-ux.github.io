    <style>
        /* Estilização baseada na imagem enviada */
        body {
            background-color: #f0e1f4; /* Roxo pastel do fundo */
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Curlz MT', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        h1 {
            color: #4a332d;
            font-size: 2.2em;
            margin-bottom: 5px;
            font-style: italic;
        }

        .author {
            font-size: 1.1em;
            color: #7a665e;
            margin-bottom: 30px;
            font-style: italic;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        /* Estilo das linhas clicáveis */
        .row {
            display: flex;
            margin-bottom: 12px;
            background: white;
            border-radius: 6px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(0,0,0,0.05);
            height: 45px;
        }

        .row:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            filter: brightness(0.98);
        }

        .row:active {
            transform: translateY(0);
        }

        /* Etiqueta Amarela (Label) */
        .label {
            background-color: #fff9c4; /* Amarelo claro da imagem */
            width: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-style: italic;
            border-right: 1px solid #f0e1f4;
            color: #444;
        }

        /* Espaço do Resultado (Value) */
        .value {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1em;
            color: #333;
            background: white;
        }

        .instruction {
            margin-top: 20px;
            color: #8b7a91;
            font-size: 0.9em;
        }
    </style>
</head>

            "Base", "Head", "Ears", "Eyes", "Nose", "Legs", "Feet", "Arms", "Hands", "Tail", "Wings", "Colour", "Extra Detail"
        ];

        function sortear() {
            return pokemonList[Math.floor(Math.random() * pokemonList.length)];
        }

        function renderizar() {
            const container = document.getElementById('generator-container');
            
            categorias.forEach(titulo => {
                // Criar elemento da linha
                const row = document.createElement('div');
                row.className = 'row';
                
                // Criar HTML interno
                row.innerHTML = `
                    <div class="label">${titulo}</div>
                    <div class="value" id="val-${titulo}">---</div>
                `;

                // Evento de clique: gera apenas para ESTA linha
                row.onclick = function() {
                    const display = document.getElementById(`val-${titulo}`);
                    display.innerText = sortear();
                    
                    // Pequeno efeito visual de "click" no texto
                    display.style.opacity = "0.5";
                    setTimeout(() => display.style.opacity = "1", 100);
                };

                container.appendChild(row);
            });
        }

        // Iniciar o site
        renderizar();
